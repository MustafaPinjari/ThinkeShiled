name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tendershield

jobs:
  # ─── Django backend tests ────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django hypothesis

      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.test_settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""
          JWT_ACCESS_TOKEN_LIFETIME: "3600"
          JWT_REFRESH_TOKEN_LIFETIME: "604800"
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          FRONTEND_ORIGIN: http://localhost:3000
          EMAIL_HOST: localhost
          EMAIL_PORT: "25"
          EMAIL_USE_TLS: "False"
          EMAIL_HOST_USER: ""
          EMAIL_HOST_PASSWORD: ""
          DEFAULT_FROM_EMAIL: test@example.com
          ML_MODEL_PATH: /tmp/ml_models
          ALERT_DEFAULT_THRESHOLD: "70"
        run: pytest --tb=short -q

  # ─── Frontend tests ──────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        run: npm test -- --ci --passWithNoTests

  # ─── Docker image builds ─────────────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [backend-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ml-worker:
    name: Build ml-worker image
    runs-on: ubuntu-latest
    needs: [backend-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ml-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ml_worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ml-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ml-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration smoke test ──────────────────────────────────────────────────
  smoke-test:
    name: Docker Compose health check + smoke test
    runs-on: ubuntu-latest
    needs: [build-backend, build-ml-worker, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CI .env
        run: |
          cat > .env <<'EOF'
          DB_ROOT_PASSWORD=ci_root_pass
          DB_NAME=tendershield
          DB_USER=tendershield
          DB_PASSWORD=ci_db_pass
          DB_HOST=db
          DB_PORT=3306
          SECRET_KEY=ci-smoke-test-secret-key
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1,backend
          JWT_PRIVATE_KEY=
          JWT_PUBLIC_KEY=
          JWT_ACCESS_TOKEN_LIFETIME=3600
          JWT_REFRESH_TOKEN_LIFETIME=604800
          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/1
          FRONTEND_ORIGIN=http://localhost:3000
          NEXT_PUBLIC_API_URL=http://localhost:8000
          EMAIL_HOST=localhost
          EMAIL_PORT=25
          EMAIL_USE_TLS=False
          EMAIL_HOST_USER=
          EMAIL_HOST_PASSWORD=
          DEFAULT_FROM_EMAIL=test@example.com
          ML_RETRAIN_INTERVAL_HOURS=24
          ML_IF_CONTAMINATION=0.05
          ML_MODEL_PATH=/app/ml_worker/models
          ALERT_DEFAULT_THRESHOLD=70
          EOF

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy (60 s timeout)
        run: |
          echo "Waiting for services to become healthy..."
          TIMEOUT=60
          ELAPSED=0
          INTERVAL=5

          while [ $ELAPSED -lt $TIMEOUT ]; do
            UNHEALTHY=$(docker compose ps --format json \
              | python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health','') not in ('healthy','')]
          print('\n'.join(unhealthy))
          " 2>/dev/null || echo "parse_error")

            if [ -z "$UNHEALTHY" ] || [ "$UNHEALTHY" = "parse_error" ]; then
              # Fallback: check via docker inspect
              ALL_HEALTHY=true
              for svc in db redis backend frontend; do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
                  "$(docker compose ps -q $svc 2>/dev/null)" 2>/dev/null || echo "unknown")
                if [ "$STATUS" != "healthy" ]; then
                  ALL_HEALTHY=false
                  echo "  $svc: $STATUS"
                fi
              done
              if [ "$ALL_HEALTHY" = "true" ]; then
                echo "All services healthy after ${ELAPSED}s"
                break
              fi
            else
              echo "  Still waiting on: $UNHEALTHY (${ELAPSED}s elapsed)"
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: Services did not become healthy within ${TIMEOUT}s"
            docker compose ps
            docker compose logs --tail=50
            exit 1
          fi

      - name: Smoke test /health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "Health response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))")
          if [ "$STATUS" != "ok" ]; then
            echo "ERROR: /health returned status='$STATUS', expected 'ok'"
            exit 1
          fi
          echo "Smoke test passed."

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down stack
        if: always()
        run: docker compose down -v
